name: Build installer

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (без префикса v)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}") {
            $v = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".TrimStart('v')
          } else {
            $v = "0.0.0-dev+${{ github.sha }}".Substring(0, 20)
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version: $v"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          # Inno Setup на runners уже есть как chocolatey-пакет
          choco install innosetup --no-progress -y

      - name: Verify Inno Setup compiler
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "Не нашёл ISCC.exe"
          }
          Write-Host "ISCC: $iscc"
          "ISCC=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          & $env:ISCC /Qp installer/setup.iss
          Get-ChildItem dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1cMcpBridge-Setup-${{ steps.ver.outputs.version }}
          path: dist/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
